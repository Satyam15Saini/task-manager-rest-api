<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Management API - Enhanced Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; --surface: #1e293b; --surface-hover: #334155;
      --text: #f8fafc; --text-muted: #94a3b8;
      --primary: #3b82f6; --primary-hover: #60a5fa;
      --success: #10b981; --error: #ef4444; --warning: #f59e0b;
      --border: #334155;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 2rem; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    h1 { margin-top: 0; color: var(--text); text-align: center; }
    h1 span { color: var(--primary); }
    h3 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    
    .grid { display: grid; grid-template-columns: 1fr; gap: 2rem; width: 100%; max-width: 800px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    
    .btn { background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); padding: 0.75rem 1rem; border-radius: 6px; font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; width: 100%; margin-bottom: 0.5rem;}
    .btn:hover { background: var(--border); }
    .btn-primary { background: var(--primary); color: white; border-color: transparent;}
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-danger { background: rgba(239, 68, 68, 0.2); color: var(--error); border-color: rgba(239, 68, 68, 0.5); }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.4); }

    input, select { width: 100%; box-sizing: border-box; padding: 0.75rem; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; margin-bottom: 1rem; }
    input:focus, select:focus { outline: 2px solid var(--primary); }
    
    .badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 99px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
    .badge-success { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    .badge-info { background: rgba(59, 130, 246, 0.2); color: var(--primary); }
    
    .console { margin-top: 2rem; padding: 1rem; background: #000; border-radius: 8px; border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; width: 100%; max-width: 800px; height: 300px; overflow-y: auto; color: var(--success); }
    .log-entry { margin-bottom: 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px dashed var(--border); }
    .log-info { color: #38bdf8; }
    .log-err { color: var(--error); }

    .task-item { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 1rem; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.9rem;}
    .task-id { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); background: var(--surface); padding: 0.2rem 0.5rem; border-radius: 4px; align-self: flex-start;}
    .task-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    
    .hidden { display: none; }
    .form-group { display: flex; gap: 1rem; }
  </style>
</head>
<body>

  <h1>Task Management <span>Extended API Demo</span></h1>
  <p style="color: var(--text-muted); margin-bottom: 2rem;">Assignment 3 Requirements Integration</p>

  <div class="grid">
    <div class="card" id="userA">
      <h3>Interactive Client</h3>
      
      <div id="authA">
        <input type="email" id="email" value="tester@demo.com">
        <input type="password" id="pass" value="securepass">
        <button class="btn btn-primary" onclick="handleAuth()">Register & Login</button>
      </div>

      <div class="hidden" id="dashA">
        <p class="badge badge-success">Authenticated</p>
        
        <hr style="border:0; border-top: 1px solid var(--border); margin: 2rem 0;">

        <!-- Categories & Tags Management -->
        <h4>1. Taxonomy Mapping</h4>
        <div class="form-group">
          <input type="text" id="newCategory" placeholder="New Category Name">
          <button class="btn" onclick="createCategory()">Create Category</button>
        </div>
        <div class="form-group">
          <input type="text" id="newTag" placeholder="New Tag Name">
          <button class="btn" onclick="createTag()">Create Tag</button>
        </div>

        <hr style="border:0; border-top: 1px solid var(--border); margin: 2rem 0;">

        <!-- Task Creation -->
        <h4>2. Advanced Event-Driven Task</h4>
        <input type="text" id="taskTitle" placeholder="Task Title (e.g. Test Webhook)">
        <div class="form-group">
          <select id="taskCategory"><option value="">No Category</option></select>
          <select id="taskTag"><option value="">No Tag</option></select>
        </div>
        <input type="datetime-local" id="taskDue" title="Due Date (triggers BullMQ Reminder)">
        <button class="btn btn-primary" onclick="createTask()">Create Task & Dispatch Event</button>

        <hr style="border:0; border-top: 1px solid var(--border); margin: 2rem 0;">

        <!-- Filtering & Viewing -->
        <h4>3. My Task Pipeline</h4>
        <div class="form-group">
          <select id="filterCategory" onchange="refreshTasks()">
            <option value="">All Categories</option>
          </select>
          <button class="btn" onclick="refreshTasks()">Refresh</button>
        </div>
        <div id="tasksContainer"></div>

      </div>
    </div>
  </div>

  <div class="console" id="logger">
    <div style="color: var(--text-muted); margin-bottom: 1rem;">// SYSTEM EVENT LOG...</div>
  </div>

  <script>
    let token = null;
    let categories = [];
    let tags = [];

    function log(action, endpoint, res, isError = false) {
      const el = document.getElementById('logger');
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry ${isError ? 'log-err' : ''}`;
      entry.innerHTML = `<strong>${time}</strong> | <span class="log-info">[${action}]</span> ${endpoint} <br>
                         <span style="color: var(--text-muted)">Payload:</span> ${JSON.stringify(res)}`;
      el.prepend(entry);
    }

    async function req(method, endpoint, body = null) {
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const config = { method, headers };
      if (body) config.body = JSON.stringify(body);

      const res = await fetch(endpoint, config);
      const data = await res.json().catch(() => ({}));
      log(method, endpoint, data, !res.ok);
      return { ok: res.ok, data };
    }

    async function handleAuth() {
      const email = document.getElementById('email').value.split('@')[0] + Date.now() + '@demo.com';
      const password = document.getElementById('pass').value;

      await req('POST', '/api/auth/register', { email, password });
      const login = await req('POST', '/api/auth/login', { email, password });
      
      if(login.ok) {
        token = login.data.token;
        document.getElementById('authA').classList.add('hidden');
        document.getElementById('dashA').classList.remove('hidden');
        await loadTaxonomy();
        await refreshTasks();
      }
    }

    async function loadTaxonomy() {
      const cRes = await req('GET', '/api/categories');
      if(cRes.ok) categories = cRes.data.categories;
      
      const tRes = await req('GET', '/api/tags');
      if(tRes.ok) tags = tRes.data.tags;

      updateSelects();
    }

    function updateSelects() {
      const catSelect = document.getElementById('taskCategory');
      const tagSelect = document.getElementById('taskTag');
      const filSelect = document.getElementById('filterCategory');
      
      catSelect.innerHTML = '<option value="">No Category</option>';
      filSelect.innerHTML = '<option value="">All Categories</option>';
      categories.forEach(c => {
        catSelect.innerHTML += `<option value="${c._id}">${c.name}</option>`;
        filSelect.innerHTML += `<option value="${c._id}">${c.name}</option>`;
      });

      tagSelect.innerHTML = '<option value="">No Tag</option>';
      tags.forEach(t => {
        tagSelect.innerHTML += `<option value="${t._id}">${t.name}</option>`;
      });
    }

    async function createCategory() {
      const name = document.getElementById('newCategory').value;
      if(!name) return;
      await req('POST', '/api/categories', { name });
      document.getElementById('newCategory').value = '';
      await loadTaxonomy();
    }

    async function createTag() {
      const name = document.getElementById('newTag').value;
      if(!name) return;
      await req('POST', '/api/tags', { name });
      document.getElementById('newTag').value = '';
      await loadTaxonomy();
    }

    async function createTask() {
      const title = document.getElementById('taskTitle').value || 'Unspecified Task';
      const catId = document.getElementById('taskCategory').value;
      const tagId = document.getElementById('taskTag').value;
      const dueDate = document.getElementById('taskDue').value;

      const payload = { title, status: 'pending' };
      if (catId) payload.categoryId = catId;
      if (tagId) payload.tags = [tagId];
      if (dueDate) payload.dueDate = new Date(dueDate).toISOString();

      const res = await req('POST', '/api/tasks', payload);
      if(res.ok) await refreshTasks();
    }

    async function updateStatus(id, currentStatus) {
      const newStatus = currentStatus === 'pending' ? 'completed' : 'pending';
      const res = await req('PATCH', `/api/tasks/${id}`, { status: newStatus });
      if(res.ok) {
        if(newStatus === 'completed') log('EVENT', 'BullMQ Webhook Dispatched', 'View your backend console!', false);
        await refreshTasks();
      }
    }

    async function deleteTask(id) {
      await req('DELETE', `/api/tasks/${id}`);
      await refreshTasks();
    }

    async function refreshTasks() {
      const fil = document.getElementById('filterCategory').value;
      const endpoint = fil ? `/api/tasks?categoryId=${fil}` : '/api/tasks';
      const res = await req('GET', endpoint);
      
      const container = document.getElementById('tasksContainer');
      if(!res.ok || !res.data.tasks.length) {
        container.innerHTML = '<p style="color: var(--text-muted)">No tasks found.</p>';
        return;
      }

      container.innerHTML = '';
      res.data.tasks.forEach(t => {
        const catName = t.categoryId ? t.categoryId.name : 'Uncategorized';
        const tagNames = t.tags && t.tags.length ? t.tags.map(tag => tag.name).join(', ') : 'No Tags';
        const badge = t.status === 'completed' ? 'badge-success' : 'badge-info';
        
        container.innerHTML += `
          <div class="task-item">
            <div style="display:flex; justify-content:space-between;">
              <strong>${t.title}</strong>
              <span class="badge ${badge}">${t.status}</span>
            </div>
            <div class="task-id">Cat: ${catName} | Tags: ${tagNames}</div>
            ${t.dueDate ? `<div class="task-id" style="color:var(--warning)">Due: ${new Date(t.dueDate).toLocaleString()}</div>` : ''}
            <div class="task-actions">
              <button class="btn" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" onclick="updateStatus('${t._id}', '${t.status}')">Toggle Status</button>
              <button class="btn btn-danger" style="padding: 0.2rem 0.5rem; font-size: 0.8rem;" onclick="deleteTask('${t._id}')">Delete</button>
            </div>
          </div>
        `;
      });
    }
  </script>
</body>
</html>
